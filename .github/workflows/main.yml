name: COMPUX ISO qurish

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Loyihani yuklab olish
        uses: actions/checkout@v4

      - name: Ruxsatlarni to'g'rilash
        run: |
          find compux-os-linux/config/hooks/live -type f -name "*.hook.chroot" -exec chmod +x {} \; 2>/dev/null || true

      - name: Qurilish vositalarini o'rnatish
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap squashfs-tools xorriso isolinux syslinux-efi grub-pc-bin grub-efi-amd64-bin mtools dosfstools

      - name: live-build sozlash
        working-directory: compux-os-linux
        run: |
          lb config \
            --distribution jammy \
            --archive-areas "main restricted universe multiverse" \
            --binary-images iso-hybrid \
            --iso-application "COMPUX" \
            --iso-volume "COMPUX" \
            --linux-flavours generic \
            --apt-recommends false \
            --debian-installer false \
          --bootloaders grub-efi,grub-pc

      - name: COMPUX ISO yig'ish
        working-directory: compux-os-linux
        run: sudo lb build

      - name: ISO faylni tayyorlash
        run: |
          mkdir -p output
          find compux-os-linux -maxdepth 1 -iname "*.iso" -exec mv {} output/COMPUX.iso \;

      - name: ISO faylni yuklab olish uchun saqlash
        uses: actions/upload-artifact@v4
        with:
          name: COMPUX-ISO
          path: output/COMPUX.iso
          retention-days: 14
