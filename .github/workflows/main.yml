name: COMPUX ISO qurish

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Loyihani yuklab olish
        uses: actions/checkout@v4

      - name: GitHub Actions Disk joyini kengaytirish (Maksimal bo'sh joy ochish)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Eski keshni tozalash
        run: |
          sudo rm -rf compux-os-linux/cache compux-os-linux/.build compux-os-linux/chroot 2>/dev/null || true

      - name: Ruxsatlarni to'g'rilash
        run: |
          find compux-os-linux/config/hooks/live -type f -name "*.hook.chroot" -exec chmod +x {} \; 2>/dev/null || true

      - name: Qurilish vositalarini o'rnatish
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap squashfs-tools xorriso isolinux syslinux-efi grub-pc-bin grub-efi-amd64-bin mtools dosfstools

            - name: live-build sozlash
        working-directory: compux-os-linux
        run: |
          sudo lb config \
            --distribution jammy \
            --binary-images iso \
            --archive-areas "main restricted universe multiverse" \
            --iso-application "COMPUX" \
            --iso-volume "COMPUX" \
            --linux-flavours generic \
            --apt-recommends false \
            --debian-installer false \
            --bootloader isolinux,grub-efi \
            --bootstrap debootstrap \
            --mirror-bootstrap "http://ubuntu.com" \
            --mirror-chroot "http://ubuntu.com" \
            --mirror-binary "http://ubuntu.com"


      - name: COMPUX ISO yig'ish
        working-directory: compux-os-linux
        run: sudo lb build

      - name: ISO faylni tayyorlash (Rufus va Fleshka uchun moslash)
        run: |
          mkdir -p output
          ISO_FILE=$(find compux-os-linux -maxdepth 1 -iname "*.iso" | head -n 1)
          if [ -n "$ISO_FILE" ]; then
            sudo isohybrid "$ISO_FILE" || true
            mv "$ISO_FILE" output/COMPUX.iso
          else
            echo "Xatolik: ISO fayli topilmadi!" && exit 1
          fi

      - name: ISO faylni yuklab olish uchun saqlash
        uses: actions/upload-artifact@v4
        with:
          name: COMPUX-ISO
          path: output/COMPUX.iso
          retention-days: 14
